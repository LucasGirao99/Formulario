<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <div id="container">

        <div class="login">
            <div class="img_logo">
                <img src="img_logo.png" alt="">
            </div>
            <div class="titulo_logo">
                <h1>Welcome!</h1>
                <h5>Sing in to your account</h5>
            </div>
            <div class="inputs_login">
                <div class="input_name_login">
                    <label>
                        Name <br>
                        <input type="text" name="nome" required placeholder="Enter your name">
                    </label> <br>
                </div>
                <div class="input_senha_login">
                    <label>
                        Senha <br>
                        <input type="password" name="senha" required placeholder="Enter your password">
                    </label> <br>
                </div>
            </div>
            <div class="password_salve">
                <label>
                    <input type="checkbox">
                    Remember me?
                </label>
                <a href="#">Forgot password?</a>
            </div>
            <div class="botao_login">
                <button type="submit">Sing in &#x021C0</button>
            </div>
        </div>

        <div class="cadastro">
            <div class="img_cadastro">
                <img src="img_cadastro.png" alt="">
            </div>
            <div class="titulo_cadastro">
                <h1>Create Account!</h1>
            </div>
            <div class="inputs_cadastro">
                <div class="input_name_cadastro">
                    <label>
                        Name <br>
                        <input type="text" name="nome" required placeholder="Enter your name">
                    </label> <br>
                </div>
                <div class="input_email_cadastro">
                    <label>
                        Email <br>
                        <input type="email" name="email" required placeholder="Enter your email">
                    </label> <br>
                </div>
                <div class="input_password_cadastro">
                    <label>
                        Password <br>
                        <input type="password" name="senha" required placeholder="Enter your password">
                    </label> <br> <br> <br>
                </div>
            </div>
            <div class="botao_cadastro">
                <button type="submit">Create &#x021C0</button>
            </div> <br> 
            <hr size="1px"> <br>
            <div class="cadastro_text">
                <p>Or create acount using social media</p>
            </div>
            <div class="cadastro_alternativo">
                <div class="altenativo1">
                    <img src="facebook_cadastro.svg" alt="">
                </div>
                <div class="alternativo1">
                    <img src="twitter_cadastro.svg" alt="">
                </div>
            </div>
        </div>

    </div>


</body>
</html>
